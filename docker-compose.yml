services:
  backend:
    container_name: backend
    image: gradle:9.1.0-jdk21-corretto
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/app_db
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      GRADLE_USER_HOME: /home/gradle/.gradle
      GRADLE_OPTS: "-Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000"
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - gradle_cache:/home/gradle/.gradle
    command: sh -c "gradle bootRun --continuous"

  frontend:
    image: node:22-alpine
    working_dir: /app
    container_name: frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - app-network
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MARIADB_DATABASE: app_db
      MARIADB_USER: app_user
      MARIADB_PASSWORD: app_password
      MARIADB_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  gradle_cache: