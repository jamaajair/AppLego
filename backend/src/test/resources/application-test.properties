spring.application.name=backend-test
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Use MariaDB database (running in Docker container)
spring.datasource.url=jdbc:mariadb://localhost:3307/app_db
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=app_user
spring.datasource.password=app_password

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flowable configuration
flowable.database.schema-update=true
flowable.common.app.idm.enabled=false
flowable.process.async-executor-activate=false

spring.sql.init.mode=never
spring.sql.init.schema-locations=
spring.sql.init.data-locations=

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

#Secret for jwt token generation (for development only, do not use in production)
security.jwt.secret=7U/BAH71JEsuiKluGpwIWwtM4Vna9ORwKgtlQBknGOg=
security.jwt.expiration=3600000

logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.web.FilterChainProxy=INFO
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Drools RuleUnit configuration
kie.scan.interval=5
kie.server.controller-user=admin
kie.server.controller-password=admin

# Spring component scan
spring.main.scan-base-packages=org.spftech.backend

# Logging for Drools
logging.level.org.drools=INFO
logging.level.org.kie=INFO
